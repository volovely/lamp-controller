name = "lamp-controller"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Cron is wired up here so the schema validates; the handler is a no-op
# until Stage 3 actually fetches Gmail.
[triggers]
crons = ["* * * * *"]

# Workers KV: command queue. Create with:
#   wrangler kv namespace create COMMANDS
# then paste the returned id below (and a preview_id for `wrangler dev`).
[[kv_namespaces]]
binding = "COMMANDS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
